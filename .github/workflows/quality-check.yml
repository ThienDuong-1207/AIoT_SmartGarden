name: CI Quality Check

on:
  pull_request:
    branches: [ "main" ] # Chạy khi có PR vào main
  push:
    branches: [ "main" ] # Chạy cả khi code đã vào main để chắc chắn

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint Check
        run: npm run lint

      - name: Build Project
        run: npm run build